<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Supabase 샘플 데이터 시드</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; color: #1e293b; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p  { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    button {
      background: #2563EB; color: #fff; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 15px; cursor: pointer;
    }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    pre {
      margin-top: 24px; background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7;
      white-space: pre-wrap; min-height: 60px;
    }
    .ok  { color: #16a34a; }
    .err { color: #dc2626; font-weight: bold; }
    .tip { margin-top: 16px; font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <h1>📦 Supabase 샘플 데이터 시드</h1>
  <p>
    버튼을 클릭하면 자산 샘플 데이터(71건)와 이력을 Supabase에 삽입합니다.<br>
    기존 데이터가 있으면 먼저 삭제 후 재삽입합니다. 한 번만 실행하면 됩니다.
  </p>
  <button id="btn" onclick="runSeed()">▶ 시드 실행</button>
  <pre id="log">버튼을 누르면 여기에 진행 상황이 표시됩니다.</pre>
  <p class="tip">⚠ 이 파일은 로컬에서만 사용하는 1회용 도구입니다. 실행 후 브라우저를 닫아도 됩니다.</p>

  <!-- Supabase JS CDN (인터넷 필요) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- 기존 샘플 데이터 생성 함수 재사용 -->
  <script src="../js/data.js"></script>

  <script>
    var SUPABASE_URL = 'https://znlcgszxhrbxkhggqbry.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_YFSpIJWlOFrf3HmfAqT63g_digrnSqw';

    async function runSeed() {
      var btn = document.getElementById('btn');
      var log = document.getElementById('log');
      btn.disabled = true;
      btn.textContent = '실행 중…';
      log.textContent = '';

      function out(msg, cls) {
        var line = document.createElement('span');
        if (cls) line.className = cls;
        line.textContent = msg + '\n';
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
      }

      try {
        var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var assets = window.APP_DATA.assets;
        out('자산 ' + assets.length + '건, Supabase 연결 확인…');

        // 1. 기존 이력 전체 삭제 (FK CASCADE이지만 명시적으로)
        out('기존 이력 데이터 삭제 중…');
        var { error: e1 } = await db.from('asset_history').delete().gte('id', 0);
        if (e1) throw new Error('이력 삭제 실패: ' + e1.message);

        // 2. 기존 자산 전체 삭제
        out('기존 자산 데이터 삭제 중…');
        var { error: e2 } = await db.from('assets').delete().neq('id', '___none___');
        if (e2) throw new Error('자산 삭제 실패: ' + e2.message);

        // 3. 자산 일괄 삽입
        out('자산 ' + assets.length + '건 삽입 중…');
        var assetRows = assets.map(function(a) {
          return {
            id: a.id, name: a.name, category: a.category, model: a.model,
            department: a.department, owner: a.owner, location: a.location,
            status: a.status, acquire_date: a.acquireDate, price: a.price
          };
        });
        var { error: e3 } = await db.from('assets').insert(assetRows);
        if (e3) throw new Error('자산 삽입 실패: ' + e3.message);
        out('✓ 자산 ' + assets.length + '건 삽입 완료', 'ok');

        // 4. 이력 일괄 삽입
        var histRows = [];
        assets.forEach(function(a) {
          (a.history || []).forEach(function(h) {
            histRows.push({ asset_id: a.id, date: h.date, type: h.type, detail: h.detail });
          });
        });
        out('이력 ' + histRows.length + '건 삽입 중…');
        // Supabase 한 번에 최대 1000건 — 배치로 나눠서 삽입
        var BATCH = 500;
        for (var i = 0; i < histRows.length; i += BATCH) {
          var chunk = histRows.slice(i, i + BATCH);
          var { error: e4 } = await db.from('asset_history').insert(chunk);
          if (e4) throw new Error('이력 삽입 실패: ' + e4.message);
        }
        out('✓ 이력 ' + histRows.length + '건 삽입 완료', 'ok');

        out('');
        out('✅ 완료! 이제 index.html을 열면 Supabase 데이터가 표시됩니다.', 'ok');
        btn.textContent = '완료 ✓';
      } catch (err) {
        out('');
        out('❌ 오류: ' + err.message, 'err');
        out('schema.sql을 먼저 Supabase SQL Editor에서 실행했는지 확인하세요.');
        btn.textContent = '다시 시도';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
