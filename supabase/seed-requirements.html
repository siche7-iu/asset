    async function runSeed() {
      var btn = document.getElementById('btn');
      var log = document.getElementById('log');
      btn.disabled = true;
      log.textContent = '연결 중...\n';

      var client;
      try {
        client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        log.textContent += '✅ Supabase 연결 성공\n\n';
      } catch(e) {
        log.innerHTML += '<span class="err">❌ 연결 실패: ' + e.message + '</span>';
        btn.disabled = false;
        return;
      }

      var ok = 0, fail = 0;
      for (var i = 0; i < REQ_ROWS.length; i++) {
        var r = REQ_ROWS[i];
        var { error } = await client.from('requirements').upsert(r);
        if (error) {
          log.innerHTML += '<span class="err">❌ ' + r.id + ': ' + error.message + '</span>\n';
          fail++;
        } else {
          log.textContent += '✅ ' + r.id + ' ' + r.name + '\n';
          ok++;
        }
      }

      log.textContent += '\n완료: 성공 ' + ok + '건 / 실패 ' + fail + '건';
      if (fail === 0) log.textContent += '\n🎉 모든 데이터가 Supabase에 저장됐습니다.';
      btn.disabled = false;
    }
  </script>
